<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="game-card">
      <header class="topbar">
        <div>
          <p class="eyebrow">Swipe Snake</p>
          <h1>贪吃蛇</h1>
        </div>
      </header>

      <section class="stats">
        <div class="stat-card">
          <span>分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat-card">
          <span>时长</span>
          <strong id="duration">00:00</strong>
        </div>
        <div class="stat-card">
          <span>最高分</span>
          <strong id="bestScore">0</strong>
        </div>
      </section>

      <section class="canvas-panel">
        <canvas id="gameCanvas" width="420" height="420"></canvas>
        <div id="overlay" class="overlay show">
          <div class="overlay-card">
            <h2 id="overlayTitle">轻点开始</h2>
            <p id="overlayText">开始后在棋盘上滑动控制方向，吃到果子就加分。</p>
            <button id="startBtn" class="primary-btn">开始游戏</button>
          </div>
        </div>
      </section>

      <section class="actions">
        <button id="restartBtn" class="ghost-btn">重新开始</button>
      </section>

      <section class="tips">
        <p>操作说明：点击开始 → 在棋盘区域滑动控制方向。没有多余按钮，没有键盘依赖。</p>
      </section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
