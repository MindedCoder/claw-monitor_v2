<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>节拍器</title>
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <main class="app-shell">
    <section class="top-card card">
      <div class="tempo-box">
        <div class="tempo-number"><span id="bpmValue">100</span><small>BPM</small></div>
        <button id="startStop" class="primary-btn" type="button">开始</button>
      </div>

      <div class="slider-row">
        <button id="decreaseBpm" class="ghost-btn" type="button">－</button>
        <input id="bpmSlider" type="range" min="30" max="240" value="100" step="1" />
        <button id="increaseBpm" class="ghost-btn" type="button">＋</button>
      </div>

      <div class="preset-row" id="presetButtons">
        <button type="button" data-bpm="60">60</button>
        <button type="button" data-bpm="80">80</button>
        <button type="button" data-bpm="100" class="active">100</button>
        <button type="button" data-bpm="120">120</button>
        <button type="button" data-bpm="140">140</button>
        <button type="button" data-bpm="180">180</button>
      </div>
    </section>

    <section class="stage-card card">
      <div class="beat-circle" id="pulseCore"><span id="currentBeat">1</span></div>
      <div id="beatDots" class="beat-dots"></div>
      <div id="statusText" class="status-text">待机中</div>
    </section>

    <section class="control-card card">
      <div class="field-grid">
        <label class="field-box">
          <span>拍号</span>
          <select id="beatsSelect">
            <option value="2">2/4</option>
            <option value="3">3/4</option>
            <option value="4" selected>4/4</option>
            <option value="5">5/4</option>
            <option value="6">6/8</option>
          </select>
        </label>

        <label class="field-box">
          <span>喊拍</span>
          <select id="voiceMode">
            <option value="off" selected>关闭</option>
            <option value="cn">中文</option>
            <option value="en">英文</option>
            <option value="count">数字</option>
          </select>
        </label>
      </div>

      <div class="switch-row">
        <label class="switch-item">
          <span>首拍重音</span>
          <input id="accentToggle" type="checkbox" checked />
        </label>
      </div>

      <label class="field-box volume-box">
        <span>音量</span>
        <input id="volumeSlider" type="range" min="0" max="100" value="75" step="1" />
      </label>
    </section>
  </main>

  <script src="app.js?v=3"></script>
</body>
</html>
