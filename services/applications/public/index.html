<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>应用</title>
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <main class="page">
    <div class="app-grid" id="appGrid">
      <button type="button" class="app-item app-item--create" id="createAppBtn">
        <span class="app-icon app-icon--create" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="app-label">创建应用</span>
      </button>
    </div>
  </main>

  <div class="modal" id="createModal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-labelledby="createModalTitle" aria-modal="true">
      <div class="modal__header">
        <h2 id="createModalTitle">创建应用</h2>
        <button type="button" class="modal__close" data-close aria-label="关闭">×</button>
      </div>

      <div class="modal__body">
        <div class="form-col">
          <label class="form-field">
            <span class="form-label">应用名称<span class="form-required">*</span></span>
            <input type="text" id="fieldName" maxlength="40" placeholder="例如：销售 CRM" autocomplete="off" />
          </label>

          <label class="form-field">
            <span class="form-label">功能描述<span class="form-required">*</span></span>
            <textarea id="fieldDescription" rows="6" maxlength="2000" placeholder="简要描述这个应用要做什么、面向谁使用、核心功能点等"></textarea>
          </label>

          <div class="form-field">
            <span class="form-label">图标（可选）</span>
            <div class="icon-uploader">
              <div class="icon-preview" id="iconPreview" aria-hidden="true">
                <span class="icon-placeholder" id="iconPlaceholder">?</span>
              </div>
              <div class="icon-actions">
                <input type="file" id="fieldIcon" accept="image/png,image/jpeg,image/webp,image/svg+xml" hidden />
                <button type="button" class="btn btn--ghost" id="iconPickBtn">选择图片</button>
                <button type="button" class="btn btn--ghost" id="iconClearBtn" hidden>清除</button>
                <p class="form-hint">建议 256×256 px 正方形，PNG/JPG/WebP/SVG，≤500KB。不上传则随机生成颜色。</p>
              </div>
            </div>
          </div>
        </div>

        <div class="preview-col">
          <div class="preview-label">提交给小龙虾的文案（可修改后复制）</div>
          <textarea id="previewText" class="preview-text" rows="10" placeholder="填完左侧表单后会自动生成文案……"></textarea>
          <p class="form-hint">复制此段文案到飞书找"小龙虾"会话粘贴，由小龙虾确认后才会真正创建应用。</p>
        </div>
      </div>

      <div class="modal__footer">
        <div class="modal__message" id="modalMessage"></div>
        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" data-close>取消</button>
          <button type="button" class="btn btn--primary" id="submitBtn">复制文案</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js?v=2"></script>
</body>
</html>
