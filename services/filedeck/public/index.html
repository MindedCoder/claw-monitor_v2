<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Filedeck Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1 id="app-title">Filedeck</h1>
      </header>

      <div class="stack">
        <div class="smart-bar smart-bar-outer">
          <button class="back-button smart-button" id="smart-match" type="button">智能识别</button>
          <div class="smart-input-wrap">
            <textarea
              class="smart-input"
              id="smart-match-input"
              rows="2"
              placeholder="粘贴路径或文本后搜索"
            ></textarea>
            <button class="smart-input-action" id="smart-match-submit" type="button" aria-label="清空输入">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M6.53 5.47 12 10.94l5.47-5.47 1.06 1.06L13.06 12l5.47 5.47-1.06 1.06L12 13.06l-5.47 5.47-1.06-1.06L10.94 12 5.47 6.53l1.06-1.06Z"
                />
              </svg>
            </button>
          </div>
        </div>
        <div id="match-results"></div>
        <section class="card browser" id="browser-card">
          <div class="section-head">
            <h2 class="section-title">目录</h2>
            <div class="head-actions">
              <button class="back-button" id="back-button" type="button">返回上一级</button>
            </div>
          </div>
          <div id="current-path" class="path"></div>
          <div class="folder-grid" id="entries">
            <div class="loading">正在加载目录...</div>
          </div>
        </section>
      </div>
    </main>

    <div class="drawer-overlay" id="drawer-overlay"></div>
    <section class="drawer" id="preview-drawer" aria-hidden="true">
      <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-head">
          <div class="drawer-actions" id="drawer-actions"></div>
          <button class="drawer-close" id="drawer-close" type="button">×</button>
        </div>
        <div class="drawer-body" id="drawer-body">
          <div class="hint">支持 `json`、`md`、`pdf`、图片和常见文本文件。</div>
        </div>
      </div>
    </section>

    <script src="app.js"></script>
  </body>
</html>
